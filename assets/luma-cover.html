<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Four Realities Workshop — Luma Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --paper: #f0ede8;
    --grid-minor: #d8d4cc;
    --grid-major: #c2bdb5;
    --ink: #1e2640;
    --accent: #3a5bcf;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: var(--paper);
    font-family: var(--mono);
    color: var(--ink);
    position: relative;
  }

  /* Graph paper — same as map */
  body {
    background-image:
      linear-gradient(var(--grid-minor) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-minor) 1px, transparent 1px),
      linear-gradient(var(--grid-major) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-major) 1px, transparent 1px);
    background-size:
      20px 20px,
      20px 20px,
      100px 100px,
      100px 100px;
    background-position: -1px -1px;
  }

  /* Brand top-left */
  .brand {
    position: absolute;
    top: 52px;
    left: 60px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 5px;
    color: var(--ink);
    opacity: 0.35;
    z-index: 4;
  }

  /* Content centered */
  .content {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Title */
  .title {
    font-family: var(--sans);
    font-size: 38px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink);
    text-align: center;
    margin-bottom: 56px;
  }
  .title .x-mark {
    color: var(--accent);
    font-weight: 400;
  }

  /* Cross SVG */
  .cross-wrap {
    position: relative;
    width: 440px;
    height: 440px;
    margin-bottom: 48px;
  }

  /* Quadrant labels */
  .q-label {
    position: absolute;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
    opacity: 0.4;
    letter-spacing: 1px;
    z-index: 5;
  }
  .q-label.tl { top: 40px; left: 24px; }
  .q-label.tr { top: 40px; right: 24px; text-align: right; }
  .q-label.bl { bottom: 40px; left: 24px; }
  .q-label.br { bottom: 40px; right: 24px; text-align: right; }

  /* Bottom info */
  .info {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--ink);
    opacity: 0.4;
  }
  .info .dot {
    margin: 0 10px;
    opacity: 0.5;
  }

</style>
</head>
<body>

  <!-- Brand -->
  <div class="brand">AI MINDSET</div>

  <!-- Content -->
  <div class="content">

    <!-- Title -->
    <div class="title">КАРТА РЕАЛЬНОСТЕЙ <span class="x-mark">&times;</span> AI</div>

    <!-- Cross diagram — same stroke style as map -->
    <div class="cross-wrap">
      <svg viewBox="0 0 440 440" fill="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%">
        <defs>
          <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
            <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" result="noise" seed="2"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Axis lines — hand-drawn feel like map -->
        <g filter="url(#rough)">
          <path d="M 220 20 C 219 100, 221 300, 220 420" stroke="#1e2640" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M 20 220 C 100 219, 340 221, 420 220" stroke="#1e2640" stroke-width="3" fill="none" stroke-linecap="round"/>
        </g>

        <!-- Axis endpoints -->
        <circle cx="220" cy="20" r="6" fill="#1e2640"/>
        <circle cx="220" cy="420" r="6" fill="#1e2640"/>
        <circle cx="20" cy="220" r="6" fill="#1e2640"/>
        <circle cx="420" cy="220" r="6" fill="#1e2640"/>

        <!-- Center circle: ЗАЧЕМ -->
        <circle cx="220" cy="220" r="26" fill="#f0ede8" stroke="#1e2640" stroke-width="3" filter="url(#glow)"/>
        <circle cx="220" cy="220" r="26" fill="none" stroke="#3a5bcf" stroke-width="1.5" opacity="0.35"/>
        <text x="220" y="225" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="700" fill="#1e2640">ЗАЧЕМ</text>

        <!-- Axis labels -->
        <text x="220" y="12" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="700" fill="#1e2640" letter-spacing="3">ДЕЦЕНТР</text>
        <text x="220" y="438" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="700" fill="#1e2640" letter-spacing="3">ЦЕНТР</text>
        <text x="10" y="220" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="700" fill="#1e2640" letter-spacing="2" transform="rotate(-90, 10, 220)">СИНТЕТИКА</text>
        <text x="430" y="220" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="700" fill="#1e2640" letter-spacing="2" transform="rotate(90, 430, 220)">ЗЕМЛЯ</text>

        <!-- Diagonal connection lines -->
        <g stroke="#c2bdb5" stroke-width="1" stroke-dasharray="4,4" opacity="0.3">
          <line x1="100" y1="100" x2="195" y2="200"/>
          <line x1="340" y1="100" x2="245" y2="200"/>
          <line x1="100" y1="340" x2="195" y2="240"/>
          <line x1="340" y1="340" x2="245" y2="240"/>
        </g>
      </svg>

      <!-- Quadrant labels -->
      <span class="q-label tl">Суверенный сад</span>
      <span class="q-label tr">Техносуверен</span>
      <span class="q-label bl">Институциональный вклад</span>
      <span class="q-label br">Коллаборация сообщества</span>
    </div>

    <!-- Info line -->
    <div class="info">
      25.04.2026<span class="dot">&middot;</span>99 EUR
    </div>

  </div>

</body>
</html>
