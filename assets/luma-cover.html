<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Карта Реальностей × AI — Luma Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    margin: 0;
    font-family: var(--mono);
    color: #fff;
    position: relative;
    background: linear-gradient(135deg, #1a1e30 0%, #1e2640 15%, #2a3a6b 50%, #3a5bcf 75%, #c45c4a 100%);
  }

  /* Noise texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
  }

  /* Mesh glow */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 2;
    background:
      radial-gradient(ellipse at 20% 35%, rgba(58,91,207,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 25%, rgba(196,92,74,0.2) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 90%, rgba(240,237,232,0.06) 0%, transparent 35%);
    pointer-events: none;
  }

  /* Watermark × */
  .watermark {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--sans);
    font-size: 400px;
    font-weight: 700;
    color: rgba(255,255,255,0.035);
    z-index: 3;
    pointer-events: none;
    line-height: 1;
  }

  /* Top content — brand + title */
  .top-content {
    position: absolute;
    top: 70px;
    left: 72px;
    right: 72px;
    z-index: 10;
  }

  .brand {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(240,237,232,0.35);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand img {
    width: 18px;
    height: 18px;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.4;
  }

  .supertitle {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(240,237,232,0.4);
    margin-bottom: 16px;
  }

  .title {
    font-family: var(--sans);
    font-size: 56px;
    font-weight: 700;
    letter-spacing: 1px;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 18px;
    text-shadow: 0 2px 40px rgba(58,91,207,0.25);
  }
  .title .x-mark {
    color: rgba(240,237,232,0.35);
    font-weight: 400;
  }

  .subtitle {
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 400;
    line-height: 1.5;
    color: rgba(240,237,232,0.7);
    max-width: 480px;
  }

  /* Center — quadrant diagram */
  .diagram-area {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) translateY(30px);
    width: 440px;
    height: 440px;
    z-index: 6;
  }

  .diagram-area::before {
    content: '';
    position: absolute;
    inset: -70px;
    background: radial-gradient(ellipse at center, rgba(58,91,207,0.18) 0%, transparent 55%);
    z-index: -1;
    pointer-events: none;
  }

  /* Subtle grid in diagram */
  .diagram-grid {
    position: absolute;
    inset: 30px;
    opacity: 0.05;
    background-image:
      linear-gradient(rgba(240,237,232,1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,237,232,1) 1px, transparent 1px);
    background-size: 38px 38px;
    pointer-events: none;
  }

  /* Bottom — speakers + meta */
  .bottom-content {
    position: absolute;
    bottom: 65px;
    left: 72px;
    right: 72px;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .speakers {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .speakers img {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(240,237,232,0.25);
    filter: grayscale(20%);
  }
  .speakers .x-sep {
    font-family: var(--sans);
    font-size: 16px;
    color: rgba(240,237,232,0.2);
  }
  .speakers .names {
    font-family: var(--mono);
    font-size: 12px;
    color: rgba(240,237,232,0.4);
    letter-spacing: 0.5px;
  }

  .meta {
    font-family: var(--mono);
    font-size: 14px;
    color: rgba(240,237,232,0.45);
    text-align: right;
    letter-spacing: 0.5px;
    line-height: 1.8;
  }

</style>
</head>
<body>

  <div class="watermark">&times;</div>

  <!-- Top — brand + title -->
  <div class="top-content">
    <div class="brand">
      <img src="logo_rb.png" alt="">
      <span>AI MINDSET</span>
    </div>
    <div class="supertitle">FOS #26 &middot; мастер-класс</div>
    <div class="title">Карта<br>Реальностей <span class="x-mark">&times;</span> AI</div>
    <div class="subtitle">как собирать свою систему решений через 4 линзы реальности</div>
  </div>

  <!-- Center — abstract quadrant diagram -->
  <div class="diagram-area">
    <div class="diagram-grid"></div>
    <svg viewBox="0 0 440 440" fill="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;">
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <radialGradient id="q1" cx="110" cy="110" r="110" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
        <radialGradient id="q2" cx="330" cy="110" r="110" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="rgba(196,92,74,0.12)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
        <radialGradient id="q3" cx="110" cy="330" r="110" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
        <radialGradient id="q4" cx="330" cy="330" r="110" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="rgba(58,91,207,0.1)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
      </defs>

      <!-- Quadrant fills -->
      <rect x="20" y="20" width="195" height="195" rx="8" fill="url(#q1)"/>
      <rect x="225" y="20" width="195" height="195" rx="8" fill="url(#q2)"/>
      <rect x="20" y="225" width="195" height="195" rx="8" fill="url(#q3)"/>
      <rect x="225" y="225" width="195" height="195" rx="8" fill="url(#q4)"/>

      <!-- Axis lines -->
      <line x1="220" y1="10" x2="220" y2="430" stroke="rgba(240,237,232,0.25)" stroke-width="2.5"/>
      <line x1="10" y1="220" x2="430" y2="220" stroke="rgba(240,237,232,0.25)" stroke-width="2.5"/>

      <!-- Axis endpoints -->
      <circle cx="220" cy="10" r="5" fill="rgba(240,237,232,0.5)"/>
      <circle cx="220" cy="430" r="5" fill="rgba(240,237,232,0.5)"/>
      <circle cx="10" cy="220" r="5" fill="rgba(240,237,232,0.5)"/>
      <circle cx="430" cy="220" r="5" fill="rgba(240,237,232,0.5)"/>

      <!-- Axis labels -->
      <text x="220" y="6" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="700" fill="rgba(240,237,232,0.5)" letter-spacing="3">ДЕЦЕНТР</text>
      <text x="220" y="448" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="11" font-weight="700" fill="rgba(240,237,232,0.5)" letter-spacing="3">ЦЕНТР</text>
      <text x="6" y="220" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="700" fill="rgba(240,237,232,0.4)" letter-spacing="2" transform="rotate(-90, 6, 220)">СИНТЕТИКА</text>
      <text x="434" y="220" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="700" fill="rgba(240,237,232,0.4)" letter-spacing="2" transform="rotate(90, 434, 220)">ЗЕМЛЯ</text>

      <!-- Diagonal connections -->
      <g stroke="rgba(240,237,232,0.1)" stroke-width="1" stroke-dasharray="4,4">
        <line x1="100" y1="100" x2="200" y2="200"/>
        <line x1="340" y1="100" x2="240" y2="200"/>
        <line x1="100" y1="340" x2="200" y2="240"/>
        <line x1="340" y1="340" x2="240" y2="240"/>
      </g>

      <!-- Center circle -->
      <circle cx="220" cy="220" r="28" fill="rgba(26,30,46,0.6)" stroke="rgba(240,237,232,0.4)" stroke-width="2.5" filter="url(#glow)"/>
      <circle cx="220" cy="220" r="28" fill="none" stroke="rgba(58,91,207,0.4)" stroke-width="1.5"/>
      <text x="220" y="225" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="12" font-weight="700" fill="rgba(240,237,232,0.85)">ЗАЧЕМ</text>

      <!-- Quadrant name labels -->
      <text x="117" y="90" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="11" fill="rgba(240,237,232,0.3)">Суверенный сад</text>
      <text x="325" y="90" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="11" fill="rgba(240,237,232,0.3)">Техносуверен</text>
      <text x="117" y="370" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" fill="rgba(240,237,232,0.25)">Институциональный</text>
      <text x="117" y="384" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" fill="rgba(240,237,232,0.25)">вклад</text>
      <text x="325" y="370" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" fill="rgba(240,237,232,0.25)">Коллаборация</text>
      <text x="325" y="384" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" fill="rgba(240,237,232,0.25)">сообщества</text>

      <!-- Decorative dots -->
      <circle cx="117" cy="140" r="3" fill="rgba(240,237,232,0.08)"/>
      <circle cx="325" cy="140" r="3" fill="rgba(196,92,74,0.12)"/>
      <circle cx="117" cy="310" r="3" fill="rgba(240,237,232,0.05)"/>
      <circle cx="325" cy="310" r="3" fill="rgba(58,91,207,0.12)"/>

      <!-- Orbit rings -->
      <circle cx="220" cy="220" r="45" fill="none" stroke="rgba(240,237,232,0.07)" stroke-width="1" stroke-dasharray="2,4"/>
      <circle cx="220" cy="220" r="68" fill="none" stroke="rgba(240,237,232,0.04)" stroke-width="1" stroke-dasharray="3,6"/>
    </svg>
  </div>

  <!-- Bottom — speakers + meta -->
  <div class="bottom-content">
    <div class="speakers">
      <img src="olya.jpg" alt="Olya Eremina">
      <span class="x-sep">&times;</span>
      <img src="alex.jpg" alt="Alex Povaliaev">
      <div class="names">Olya Eremina &middot; Alex Povaliaev</div>
    </div>
    <div class="meta">
      25 апреля 2026<br>
      Zoom &middot; 99 EUR &middot; 36 мест
    </div>
  </div>

</body>
</html>
