<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Four Realities Workshop OG Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    margin: 0;
    font-family: var(--mono);
    color: #fff;
    position: relative;
    background: linear-gradient(135deg, #1e2640, #2a3a6b 40%, #3a5bcf 70%, #c45c4a 100%);
  }

  /* ── Noise texture overlay ── */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
  }

  /* ── Large decorative multiply sign watermark ── */
  .watermark {
    position: absolute;
    top: 50%;
    left: 42%;
    transform: translate(-50%, -50%);
    font-family: var(--sans);
    font-size: 180px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.06);
    z-index: 2;
    pointer-events: none;
    line-height: 1;
  }

  /* ── Title block: top-left ── */
  .title-block {
    position: absolute;
    top: 80px;
    left: 80px;
    z-index: 5;
  }

  .title {
    font-family: var(--sans);
    font-size: 58px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1.12;
    margin-bottom: 18px;
    text-shadow: 0 2px 30px rgba(58,91,207,0.3);
  }

  .title .x-mark {
    color: rgba(255, 255, 255, 0.5);
    font-weight: 400;
  }

  .subtitle {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 400;
    color: rgba(240, 237, 232, 0.6);
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .details {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 400;
    color: rgba(240, 237, 232, 0.45);
    letter-spacing: 0.5px;
  }

  /* ── Speaker photos: bottom-left ── */
  .speakers {
    position: absolute;
    bottom: 60px;
    left: 80px;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .speaker-photos {
    display: flex;
    gap: 10px;
  }

  .speaker-photos img {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2.5px solid rgba(255, 255, 255, 0.7);
    object-fit: cover;
    filter: grayscale(20%);
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }

  .speaker-names {
    font-family: var(--mono);
    font-size: 12px;
    color: rgba(240, 237, 232, 0.5);
    letter-spacing: 0.3px;
  }

  /* ── Logo: bottom-right ── */
  .logo-block {
    position: absolute;
    bottom: 60px;
    right: 80px;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-block img {
    height: 24px;
    filter: brightness(0) invert(1);
  }

  .logo-block span {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(255, 255, 255, 0.6);
  }

  /* ── 4-quadrant diagram: center-right, larger & juicier ── */
  .quadrant-wrap {
    position: absolute;
    top: 50%;
    right: 60px;
    transform: translateY(-50%);
    width: 420px;
    height: 420px;
    z-index: 4;
  }

  /* Mesh glow behind diagram */
  .quadrant-wrap::before {
    content: '';
    position: absolute;
    inset: -60px;
    background: radial-gradient(ellipse at center, rgba(58,91,207,0.25) 0%, transparent 60%);
    z-index: -1;
    pointer-events: none;
  }

</style>
</head>
<body>

  <!-- Watermark -->
  <div class="watermark">&times;</div>

  <!-- Title -->
  <div class="title-block">
    <div class="title">КАРТА РЕАЛЬНОСТЕЙ <span class="x-mark">&times;</span> AI</div>
    <div class="subtitle">мастер-класс &middot; 25 апреля 2026</div>
    <div class="details">4 часа &middot; Zoom &middot; 99 EUR</div>
  </div>

  <!-- Speaker photos -->
  <div class="speakers">
    <div class="speaker-photos">
      <img src="olya.jpg" alt="Olya Eremina">
      <img src="alex.jpg" alt="Alex Povaliaev">
    </div>
    <div class="speaker-names">Olya Eremina &times; Alex Povaliaev</div>
  </div>

  <!-- Logo -->
  <div class="logo-block">
    <img src="logo_rb.png" alt="AI Mindset">
    <span>AI MINDSET</span>
  </div>

  <!-- 4-quadrant abstract diagram -->
  <div class="quadrant-wrap">
    <svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%">
      <defs>
        <!-- Glow filter for center circle -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Outer glow for center -->
        <filter id="outerGlow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Radial gradient for quadrant fills -->
        <radialGradient id="qFill1" cx="75" cy="75" r="90" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="rgba(255,255,255,0.14)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
        <radialGradient id="qFill2" cx="225" cy="75" r="90" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="rgba(255,255,255,0.05)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
        <radialGradient id="qFill3" cx="75" cy="225" r="90" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="rgba(255,255,255,0.04)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
        <radialGradient id="qFill4" cx="225" cy="225" r="90" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
      </defs>

      <!-- Quadrant fills with different opacities -->
      <rect x="15" y="15" width="135" height="135" fill="url(#qFill1)" rx="4"/>
      <rect x="150" y="15" width="135" height="135" fill="url(#qFill2)" rx="4"/>
      <rect x="15" y="150" width="135" height="135" fill="url(#qFill3)" rx="4"/>
      <rect x="150" y="150" width="135" height="135" fill="url(#qFill4)" rx="4"/>

      <!-- Dashed circle around center -->
      <circle cx="150" cy="150" r="65" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="5,5" fill="none"/>

      <!-- Thin white cross lines -->
      <line x1="150" y1="20" x2="150" y2="280" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line x1="20" y1="150" x2="280" y2="150" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

      <!-- Small corner tick marks -->
      <line x1="148" y1="20" x2="152" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
      <line x1="148" y1="280" x2="152" y2="280" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
      <line x1="20" y1="148" x2="20" y2="152" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
      <line x1="280" y1="148" x2="280" y2="152" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>

      <!-- Outer soft glow at center -->
      <circle cx="150" cy="150" r="22" fill="rgba(58,91,207,0.25)" filter="url(#outerGlow)"/>

      <!-- Center glowing circle -->
      <circle cx="150" cy="150" r="14" fill="rgba(58,91,207,0.6)" filter="url(#glow)"/>
      <circle cx="150" cy="150" r="14" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
      <circle cx="150" cy="150" r="5" fill="rgba(255,255,255,0.9)"/>

      <!-- Subtle dots at quadrant centers -->
      <circle cx="82" cy="82" r="3" fill="rgba(255,255,255,0.12)"/>
      <circle cx="218" cy="82" r="3" fill="rgba(255,255,255,0.14)"/>
      <circle cx="82" cy="218" r="3" fill="rgba(255,255,255,0.06)"/>
      <circle cx="218" cy="218" r="3" fill="rgba(255,255,255,0.10)"/>

      <!-- Fine diagonal lines toward center -->
      <line x1="82" y1="82" x2="138" y2="138" stroke="rgba(255,255,255,0.07)" stroke-width="0.5" stroke-dasharray="3,4"/>
      <line x1="218" y1="82" x2="162" y2="138" stroke="rgba(255,255,255,0.07)" stroke-width="0.5" stroke-dasharray="3,4"/>
      <line x1="82" y1="218" x2="138" y2="162" stroke="rgba(255,255,255,0.07)" stroke-width="0.5" stroke-dasharray="3,4"/>
      <line x1="218" y1="218" x2="162" y2="162" stroke="rgba(255,255,255,0.07)" stroke-width="0.5" stroke-dasharray="3,4"/>

    </svg>
  </div>

</body>
</html>
