<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Four Realities Workshop OG Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --paper: #f0ede8;
    --grid-minor: #d8d4cc;
    --grid-major: #c2bdb5;
    --ink: #1e2640;
    --accent: #3a5bcf;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: var(--paper);
    font-family: var(--mono);
    color: var(--ink);
    position: relative;
  }

  /* Graph paper — same as map */
  body {
    background-image:
      linear-gradient(var(--grid-minor) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-minor) 1px, transparent 1px),
      linear-gradient(var(--grid-major) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-major) 1px, transparent 1px);
    background-size:
      20px 20px,
      20px 20px,
      100px 100px,
      100px 100px;
    background-position: -1px -1px;
  }

  /* Brand top-left */
  .brand {
    position: absolute;
    top: 30px;
    left: 40px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 5px;
    color: var(--ink);
    opacity: 0.35;
    z-index: 4;
  }

  /* Layout: left text + right cross */
  .layout {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 60px;
    padding: 0 80px;
  }

  /* Left side */
  .left {
    flex: 1;
    max-width: 500px;
  }

  .title {
    font-family: var(--sans);
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .title .x-mark {
    color: var(--accent);
    font-weight: 400;
  }

  .subtitle {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  .rule {
    width: 200px;
    height: 3px;
    background: var(--ink);
    margin-bottom: 16px;
  }

  .meta {
    font-family: var(--mono);
    font-size: 13px;
    color: rgba(30,38,64,0.4);
    line-height: 1.8;
    letter-spacing: 0.5px;
  }

  /* Right side: cross */
  .cross-wrap {
    position: relative;
    width: 320px;
    height: 320px;
    flex-shrink: 0;
  }

  .q-label {
    position: absolute;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--ink);
    opacity: 0.35;
    letter-spacing: 0.5px;
    z-index: 5;
  }
  .q-label.tl { top: 28px; left: 14px; }
  .q-label.tr { top: 28px; right: 14px; text-align: right; }
  .q-label.bl { bottom: 28px; left: 14px; }
  .q-label.br { bottom: 28px; right: 14px; text-align: right; }

</style>
</head>
<body>

  <!-- Brand -->
  <div class="brand">AI MINDSET</div>

  <!-- Layout -->
  <div class="layout">

    <!-- Left: text -->
    <div class="left">
      <div class="title">КАРТА РЕАЛЬНОСТЕЙ <span class="x-mark">&times;</span> AI</div>
      <div class="subtitle">Integral Context OS</div>
      <div class="rule"></div>
      <div class="meta">
        мастер-класс &middot; 25 апреля 2026<br>
        99 EUR &middot; 30 мест &middot; Zoom<br>
        Alex Povaliaev + Olya Eremina
      </div>
    </div>

    <!-- Right: cross -->
    <div class="cross-wrap">
      <svg viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%">
        <defs>
          <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
            <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" result="noise" seed="2"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Axis lines -->
        <g filter="url(#rough)">
          <path d="M 160 15 C 159 80, 161 240, 160 305" stroke="#1e2640" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M 15 160 C 80 159, 240 161, 305 160" stroke="#1e2640" stroke-width="3" fill="none" stroke-linecap="round"/>
        </g>

        <!-- Endpoints -->
        <circle cx="160" cy="15" r="5" fill="#1e2640"/>
        <circle cx="160" cy="305" r="5" fill="#1e2640"/>
        <circle cx="15" cy="160" r="5" fill="#1e2640"/>
        <circle cx="305" cy="160" r="5" fill="#1e2640"/>

        <!-- Center circle -->
        <circle cx="160" cy="160" r="20" fill="#f0ede8" stroke="#1e2640" stroke-width="2.5" filter="url(#glow)"/>
        <circle cx="160" cy="160" r="20" fill="none" stroke="#3a5bcf" stroke-width="1" opacity="0.35"/>
        <text x="160" y="164" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="10" font-weight="700" fill="#1e2640">ЗАЧЕМ</text>

        <!-- Axis labels -->
        <text x="160" y="8" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="8" font-weight="700" fill="#1e2640" letter-spacing="2">ДЕЦЕНТР</text>
        <text x="160" y="318" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="8" font-weight="700" fill="#1e2640" letter-spacing="2">ЦЕНТР</text>

        <!-- Diagonal lines -->
        <g stroke="#c2bdb5" stroke-width="0.75" stroke-dasharray="3,3" opacity="0.3">
          <line x1="70" y1="70" x2="142" y2="144"/>
          <line x1="250" y1="70" x2="178" y2="144"/>
          <line x1="70" y1="250" x2="142" y2="176"/>
          <line x1="250" y1="250" x2="178" y2="176"/>
        </g>
      </svg>

      <!-- Quadrant labels -->
      <span class="q-label tl">Суверенный сад</span>
      <span class="q-label tr">Техносуверен</span>
      <span class="q-label bl">Институц. вклад</span>
      <span class="q-label br">Коллаборация</span>
    </div>

  </div>

</body>
</html>
